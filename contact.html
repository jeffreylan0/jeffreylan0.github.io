<body>
   <div class="row" id="menucontainer">
      <div class="col-sm-1 text-bg-primary" id="arrowmenuelement" onclick="expandMenu()">
         <span class="material-symbols-outlined" id="expansionArrow">menu</span>
      </div>
      <div class="col-sm-3 prim menuelement">
         <a href="index.html" class="text-light menutext">home</a>

      <div class="col-sm-3 sec menuelement">

   </div>

   <div class="introheaders container-fluid text-dark">
      <h1>welcome</h1>
   </div>
   <div class="introheaders container-fluid text-dark">
      <h6 id="quote"></h6>
   </div>

   <script>
      // this chunk of code is garbage but it works
      XMLReq = new XMLHttpRequest();
      var res;

      XMLReq.open("GET", "https://api.quotable.io/random", false)

      XMLReq.onreadystatechange = function () {
         if (XMLReq.readyState == 4 && XMLReq.status == 200) {
            res = JSON.parse(XMLReq.responseText);
         }
      }

      XMLReq.send();
      document.getElementById("quote").innerHTML = "\"" + res["content"] + "\"" + " - " + res["author"];

   </script>
</body>
